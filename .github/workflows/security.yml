name: Security Audit

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sunday at midnight
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --production --audit-level=moderate

      - name: Run npm audit for high/critical vulnerabilities
        id: audit
        run: |
          npm audit --production --audit-level=high > audit-report.json || true
          echo "vulnerabilities_found=$(jq '.metadata.vulnerabilities.total > 0' audit-report.json)" >> $GITHUB_OUTPUT

      - name: Fail on high/critical vulnerabilities
        if: steps.audit.outputs.vulnerabilities_found == 'true'
        run: |
          echo "High or critical vulnerabilities found!"
          cat audit-report.json
          exit 1

      - name: Update dependencies (weekly schedule only)
        if: github.event_name == 'schedule'
        run: |
          npm update
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore: update dependencies [skip ci]" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
