<section id="alice" class="relative min-h-screen w-full overflow-hidden">
  <!-- Background Image -->
  <div
    class="absolute inset-0 bg-cover bg-center bg-no-repeat alice-bg"
    [style.backgroundImage]="'url(assets/secion-1/wlop-alice-bg.webp)'"
  ></div>

  <!-- Overlay -->
  <div class="absolute inset-0 bg-black/50"></div>

  <!-- Content -->
  <div class="relative z-10 flex items-center min-h-screen">
    <div class="max-w-2xl ml-auto mr-12 p-8 character-content">
      <h2 class="text-6xl md:text-8xl font-bold text-[#d4af37] mb-6 tracking-wider">Colores</h2>
      <p class="text-lg md:text-xl text-white/90 leading-relaxed">
        Un personaje enigmático con una mirada que trasciende la realidad. Su diseño captura la
        esencia de la elegancia oscura, con detalles intrincados que revelan la maestría de WLOP en
        el arte digital.
      </p>
    </div>
  </div>
</section>
