<section id="mica" class="relative min-h-screen w-full overflow-hidden">
  <!-- Background Image -->
  <div
    class="absolute inset-0 bg-cover bg-center bg-no-repeat mica-bg"
    [style.backgroundImage]="'url(assets/secion-03/wlop-mica.webp)'"
  ></div>

  <!-- Overlay -->
  <div class="absolute inset-0 bg-black/50"></div>

  <!-- Content -->
  <div class="relative z-10 flex items-center min-h-screen">
    <div class="max-w-2xl ml-auto mr-12 p-8 character-content">
      <h2 class="text-6xl md:text-8xl font-bold text-[#d4af37] mb-6 tracking-wider">
        Personalidad
      </h2>
      <p class="text-lg md:text-xl text-white/90 leading-relaxed">
        Un personaje con una personalidad única y cautivadora. Su diseño refleja la habilidad de
        WLOP para crear conexiones emocionales a través del arte, con expresiones que cuentan
        historias y detalles que invitan a la exploración.
      </p>
    </div>
  </div>
</section>
