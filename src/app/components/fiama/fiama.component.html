<section id="fiama" class="relative min-h-screen w-full overflow-hidden">
  <!-- Background Image -->
  <div
    class="absolute inset-0 bg-cover bg-center bg-no-repeat fiama-bg"
    [style.backgroundImage]="'url(assets/secion-02/wlop-fiama.webp)'"
  ></div>

  <!-- Overlay -->
  <div class="absolute inset-0 bg-black/50"></div>

  <!-- Content -->
  <div class="relative z-10 flex items-center min-h-screen">
    <div class="max-w-2xl ml-12 p-8 character-content">
      <h2 class="text-6xl md:text-8xl font-bold text-[#d4af37] mb-6 tracking-wider">Unico</h2>
      <p class="text-lg md:text-xl text-white/90 leading-relaxed">
        Un personaje que irradia fuerza y determinación. Su diseño combina elementos de fantasía con
        un estilo realista impresionante, mostrando la capacidad de WLOP para crear mundos vibrantes
        y personajes memorables.
      </p>
    </div>
  </div>
</section>
